
services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-devroot_change_me}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-change_me}
      MYSQL_USER: ${MYSQL_USER:-change_me}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change_me}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1',
        ]
      interval: 5s
      timeout: 5s
      retries: 16
      start_period: 30s
    ports:
      - '127.0.0.1:3306:3306'

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      PORT: 3001
      NODE_ENV: production
      DATABASE_HOST: mysql
      DATABASE_PORT: 3306
      DATABASE_USER: ${MYSQL_USER:-meikai}
      DATABASE_PASSWORD: ${MYSQL_PASSWORD:-meikai_pass_change_me}
      DATABASE_NAME: ${MYSQL_DATABASE:-meikai}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
    depends_on:
      mysql:
        condition: service_healthy
    expose:
      - '3001'

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ''
        VITE_SITE_ORIGIN: ${VITE_SITE_ORIGIN:-https://www.meikaizs.com}
    restart: unless-stopped
    ports:
      - '${WEB_PORT:-8080}:80'
    depends_on:
      - backend

  # ---- AI 栈:默认不启,需要时 `docker compose --profile ai up` ----
  # dev 优先开发体验:暴露端口到 127.0.0.1、代码挂载、uvicorn --reload
  qdrant:
    image: qdrant/qdrant:v1.15.2
    profiles: ['ai']
    restart: unless-stopped
    ports:
      - '127.0.0.1:6333:6333'
    volumes:
      - qdrant_dev:/qdrant/storage

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    profiles: ['ai']
    restart: unless-stopped
    env_file:
      - ./ai-service/.env
    environment:
      # dev 默认就指向同 compose 的服务名
      QDRANT_URL: http://qdrant:6333
      MYSQL_HOST: mysql
      BACKEND_INTERNAL_URL: http://backend:3001
      LLM_MODE: ${LLM_MODE:-mock}
    depends_on:
      mysql:
        condition: service_healthy
      qdrant:
        condition: service_started
    ports:
      - '127.0.0.1:8000:8000'
    # 代码热挂载:改 Python 文件 uvicorn 自动 reload
    volumes:
      - ./ai-service/app:/app/app
      - ./ai-service/etl:/app/etl
      - ./ai-service/schemas:/app/schemas
      - ./ai-service/knowledge:/app/knowledge
    # 覆盖镜像 entrypoint,dev 模式跳过 oom_score_adj 写入,直接开 --reload
    entrypoint: []
    command: ['uvicorn', 'app.main:app', '--host', '0.0.0.0', '--port', '8000', '--reload']

volumes:
  mysql_data:
  qdrant_dev:
