# 本地开发。生产上线（HTTPS / 腾讯云）见 deploy/docker-compose.prod.yml 与 deploy/TENCENT_CLOUD.md

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-devroot_change_me}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-meikai}
      MYSQL_USER: ${MYSQL_USER:-meikai}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-meikai_pass_change_me}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1',
        ]
      interval: 5s
      timeout: 5s
      retries: 16
      start_period: 30s
    ports:
      - '127.0.0.1:3306:3306'

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      PORT: 3001
      NODE_ENV: production
      DATABASE_HOST: mysql
      DATABASE_PORT: 3306
      DATABASE_USER: ${MYSQL_USER:-meikai}
      DATABASE_PASSWORD: ${MYSQL_PASSWORD:-meikai_pass_change_me}
      DATABASE_NAME: ${MYSQL_DATABASE:-meikai}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
    depends_on:
      mysql:
        condition: service_healthy
    expose:
      - '3001'

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ''
        VITE_SITE_ORIGIN: ${VITE_SITE_ORIGIN:-https://www.meikaizs.com}
    restart: unless-stopped
    ports:
      - '${WEB_PORT:-8080}:80'
    depends_on:
      - backend

volumes:
  mysql_data:
