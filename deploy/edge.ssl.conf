# 证书就绪后使用：80 仅用于 ACME 与跳转 HTTPS
# 用法：cp edge.ssl.conf edge.active.conf && docker compose exec nginx-proxy nginx -s reload

ssl_protocols TLSv1.2 TLSv1.3;
ssl_prefer_server_ciphers off;

server {
  listen 80;
  server_name www.meikaizs.com meikaizs.com;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://www.meikaizs.com$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name meikaizs.com;

  ssl_certificate /etc/letsencrypt/live/www.meikaizs.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/www.meikaizs.com/privkey.pem;

  return 301 https://www.meikaizs.com$request_uri;
}

server {
  listen 443 ssl http2;
  server_name www.meikaizs.com;

  ssl_certificate /etc/letsencrypt/live/www.meikaizs.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/www.meikaizs.com/privkey.pem;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  location / {
    proxy_pass http://web:80;
    proxy_http_version 1.1;
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }
}
