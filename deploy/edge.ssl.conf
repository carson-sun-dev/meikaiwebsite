# 证书就绪后使用：80 仅用于 ACME 与跳转 HTTPS
# 用法：cp edge.ssl.conf edge.active.conf && docker compose exec nginx-proxy nginx -s reload

ssl_protocols TLSv1.2 TLSv1.3;
ssl_prefer_server_ciphers off;

# DESIGN §9.2.1 / §10 表第 4 项:按 IP 限速 + 限连接数,2C2G 第一道 OOM 闸
# zone 必须在 http {} 层;nginx include conf.d/*.conf 已在 http {} 内,这里同级可放
limit_req_zone $binary_remote_addr zone=ai_chat_req:10m rate=10r/m;
limit_conn_zone $binary_remote_addr zone=ai_chat_conn:10m;

server {
  listen 80;
  server_name www.meikaizs.com meikaizs.com;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://www.meikaizs.com$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name meikaizs.com;

  ssl_certificate /etc/letsencrypt/live/www.meikaizs.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/www.meikaizs.com/privkey.pem;

  return 301 https://www.meikaizs.com$request_uri;
}

server {
  listen 443 ssl http2;
  server_name www.meikaizs.com;

  ssl_certificate /etc/letsencrypt/live/www.meikaizs.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/www.meikaizs.com/privkey.pem;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # ---- AI 客服 SSE(DESIGN §9.2.1)----
  # proxy_buffering off 是 SSE 能流出的硬条件;buffer 开着会卡到第一块 buffer 满才推
  location /api/ai/chat {
    limit_req zone=ai_chat_req burst=5 nodelay;
    limit_conn ai_chat_conn 2;

    proxy_pass http://ai-service:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Connection '';

    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    chunked_transfer_encoding on;
  }

  # ---- AI 文件上传(CAD/图纸,Sprint 2 启用)----
  location /api/ai/upload {
    limit_req zone=ai_chat_req burst=3 nodelay;
    limit_conn ai_chat_conn 1;

    client_max_body_size 20m;
    proxy_pass http://ai-service:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 120s;
  }

  # ---- AI 其余接口(健康检查、反馈等)----
  location /api/ai/ {
    limit_req zone=ai_chat_req burst=10 nodelay;

    proxy_pass http://ai-service:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }

  # ---- 网站主流量(SPA + /api/leads/* 由 web 容器内 nginx 再分发到 backend)----
  location / {
    proxy_pass http://web:80;
    proxy_http_version 1.1;
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }
}
