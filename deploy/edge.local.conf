# 本地预演专用 nginx 配置 — 端到端跑 deploy/docker-compose.prod.yml 但无 SSL。
# 用法:cp edge.local.conf edge.active.conf 后启 compose;浏览器访问 http://localhost
#
# 与 edge.ssl.conf 的差异:
# - 删 listen 443 ssl + ssl_certificate*
# - 删 HSTS / 301 jump
# - server_name 改 localhost(本机访问;若用 hosts 自定义域名同样可加)
# - 保留所有 /api/ai/* SSE 路由 + 限流 zone(否则本地验不到 nginx 这层行为)

# DESIGN §9.2.1:限流 zone,本地一样按 IP 计数,验证限流策略本身
limit_req_zone $binary_remote_addr zone=ai_chat_req:10m rate=10r/m;
limit_conn_zone $binary_remote_addr zone=ai_chat_conn:10m;

server {
  listen 80;
  server_name localhost;

  # 安全 header 本地也带上,验证 web 端不会被它们误伤
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # ---- AI 客服 SSE ----
  # proxy_buffering off 是 SSE 能流出的硬条件
  location /api/ai/chat {
    limit_req zone=ai_chat_req burst=5 nodelay;
    limit_conn ai_chat_conn 2;

    proxy_pass http://ai-service:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto http;
    proxy_set_header Connection '';

    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    chunked_transfer_encoding on;
  }

  # ---- AI 文件上传(Sprint 2 启用)----
  location /api/ai/upload {
    limit_req zone=ai_chat_req burst=3 nodelay;
    limit_conn ai_chat_conn 1;

    client_max_body_size 20m;
    proxy_pass http://ai-service:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto http;
    proxy_read_timeout 120s;
  }

  # ---- AI 其余接口(健康检查、反馈等)----
  location /api/ai/ {
    limit_req zone=ai_chat_req burst=10 nodelay;

    proxy_pass http://ai-service:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto http;
  }

  # ---- 网站主流量(SPA + /api/leads/* 由 web 容器内 nginx 分发到 backend)----
  location / {
    proxy_pass http://web:80;
    proxy_http_version 1.1;
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto http;
  }
}
