# 生产环境（腾讯云等）：边缘 Nginx 终止 SSL，web 仅内网，MySQL 不映射宿主机端口
# 使用：见 deploy/TENCENT_CLOUD.md
# 首次部署前：cp edge.http.conf edge.active.conf

name: meikai

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      # WHY 用 MySQL 8.0 默认 utf8mb4_0900_ai_ci 而非 utf8mb4_unicode_ci:
      # langgraph-checkpoint-mysql 的 CREATE TABLE DDL 不写 COLLATE,落到 _0900_ai_ci;
      # 服务端若强制 _unicode_ci → WHERE 子句字符串字面量走服务端 collation,
      # 与列 collation 不同导致 "Illegal mix of collations" (1267) 报错。
      - --collation-server=utf8mb4_0900_ai_ci
      - --innodb-buffer-pool-size=256M
      - --max-connections=80
      - --performance-schema=OFF
      - --table-open-cache=200
      # WHY 把 wait_timeout 拉到 30 天:AIOMySQLSaver 连接池没有自动 ping/reconnect,
      # 默认 wait_timeout=8h 时,长时间无请求后第一个请求必报 OperationalError(2013)。
      # 这是临时缓解;根治需在 saver 包装层加 retry-on-stale,见 DESIGN §15.2 / Sprint 5 已知问题
      - --wait-timeout=2592000
      - --interactive-timeout=2592000
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-meikai}
      MYSQL_USER: ${MYSQL_USER:-meikai}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1',
        ]
      interval: 5s
      timeout: 5s
      retries: 16
      start_period: 30s
    expose:
      - '3306'
    networks:
      - internal
    # DESIGN §9.2.2:2GB 内存机型,所有 service 必须卡死内存预算,避免 OOM 误杀 mysql
    mem_limit: 600m
    mem_reservation: 400m

  backend:
    build:
      # 与 backend/Dockerfile 中 COPY 路径一致：上下文必须是 backend/ 目录
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: 3001
      NODE_ENV: production
      DATABASE_HOST: mysql
      DATABASE_PORT: 3306
      DATABASE_USER: ${MYSQL_USER:-meikai}
      DATABASE_PASSWORD: ${MYSQL_PASSWORD}
      DATABASE_NAME: ${MYSQL_DATABASE:-meikai}
      CORS_ORIGINS: ${CORS_ORIGINS:?set CORS_ORIGINS}
    depends_on:
      mysql:
        condition: service_healthy
    expose:
      - '3001'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "node -e \"fetch('http://127.0.0.1:3001/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 20s
      timeout: 8s
      retries: 5
      start_period: 50s
    networks:
      - internal
    mem_limit: 256m
    mem_reservation: 150m

  web:
    build:
      # 与 frontend/Dockerfile 中 COPY 路径一致：上下文必须是 frontend/ 目录
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ''
        VITE_SITE_ORIGIN: ${VITE_SITE_ORIGIN:-https://www.meikaizs.com}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - '80'
    networks:
      - internal
    mem_limit: 80m

  nginx-proxy:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./edge.active.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    depends_on:
      - web
    networks:
      - internal
    mem_limit: 80m

  # ---- AI 服务(DESIGN §9.2.2,Sprint 1 骨架) ----
  # 占位上线期(2026-06-24)用 profiles: [ai] 默认不启,省 ~500M 内存。
  # 恢复:`docker compose -f deploy/docker-compose.prod.yml --env-file .env --profile ai up -d`
  ai-service:
    profiles: [ai]
    build:
      context: ../ai-service
      dockerfile: Dockerfile
    restart: unless-stopped
    # Key 不写 environment,统一从 env_file 注入(DESIGN §10 表第 1 项)
    env_file:
      - ../ai-service/.env
    environment:
      # 显式兜底:即便 .env 漏写 LLM_MODE 也不会误切到 live(可能 key 还没填)
      LLM_MODE: ${LLM_MODE:-mock}
    volumes:
      # 数据集走 volume:更新数据无需 rebuild 镜像;.dockerignore 已屏蔽 data/
      - ../ai-service/data:/app/data:ro
    depends_on:
      mysql:
        condition: service_healthy
      qdrant:
        condition: service_started
    expose:
      - '8000'
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:8000/healthz || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - internal
    mem_limit: 500m          # DESIGN §13.2:去 PaddleOCR 后从 700m 下调
    mem_reservation: 350m
    cpus: '1.5'
    # 让 ai-service 在 OOM 时比 mysql 先死(entrypoint 写 /proc/self/oom_score_adj)
    cap_add:
      - SYS_RESOURCE

  qdrant:
    # 占位上线期同步关停,跟 ai-service 一组 profile,避免无端 400M 占用
    profiles: [ai]
    # DESIGN §13.1/§13.2:服务端原生 BM25 + IDF 需 v1.15.2+
    image: qdrant/qdrant:v1.15.2
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:?set QDRANT_API_KEY}
    volumes:
      - qdrant_data:/qdrant/storage
    expose:
      - '6333'
    networks:
      - internal
    mem_limit: 400m

  # 仅用于 one-shot：docker compose --profile tools run --rm certbot certonly ...
  certbot:
    image: certbot/certbot:latest
    profiles:
      - tools
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-www:/var/www/certbot

volumes:
  mysql_data:
  certbot-etc:
  certbot-www:
  qdrant_data:

networks:
  internal:
