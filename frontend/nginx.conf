map $http_x_forwarded_proto $forwarded_proto {
  ''      $scheme;
  default $http_x_forwarded_proto;
}

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

  # index.html 是 SPA 入口,引用的 /assets/*-{hash}.{css,js} 每次 build 后 hash 都变;
  # 一旦它被缓存 → 老 HTML 引用的旧 hash 资源在 dist 里不存在 → 浏览器 404 → Vue 不挂载 → 空白页。
  # 因此必须显式 no-cache(2026-06-24 上线后发生过整站空白,见 commit log)。
  # 注:CDN 侧(腾讯云 EdgeOne / CDN)还需在控制台配规则:.html 不缓存或跟随源站。
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Pragma "no-cache" always;
    expires off;
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  # Vite 带 hash 的静态资源(immutable + 1y)— 配合 index.html no-cache 形成
  # "入口短命 + 资源长命" 的标准 SPA 缓存策略
  location /assets/ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location /api/ {
    proxy_pass http://backend:3001/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;
  }
}
