# L3 问询模板(DESIGN §5.5)— 家装。每槽位 3+ 话术变体,模型缺槽时按需读 1 条(~50 tok)。
area_sqm:
  - "您家套内面积多大?有没有套内/建筑两个数字,以套内为准会更准确。"
  - "户型图上方便看一下面积吗?或者直接告诉我大概多少平米也行。"
  - "套内大概多少平方?如果不确定可以发一张户型图,我帮您估。"
layout:
  - "您家是几室几厅几卫?"
  - "户型大概是什么样的——两室、三室还是更多?有没有独立的卫生间和厨房?"
  - "户型布局怎么样?方便描述下功能间数量。"
tier:
  - "您打算做基础装修、中端,还是更精致的高端档?"
  - "预算大方向是想简单实用,还是要做品质感?这影响主材的选型。"
  - "心里有没有大致的档次定位:基础/中端/高端三档,您倾向哪一档?"
contract_type:
  - "您打算清包(自己买所有材料)、半包(主材自购、辅料人工我们出)还是全包(拎包入住)?"
  - "想自己买主材还是全部交给我们?这两个模式造价差别比较大。"
headcount:
  - "家里常住几口人?有没有老人或孩子?"
needs_central_ac_or_floor_heating:
  - "是否考虑中央空调、新风系统或地暖?这部分对水电改造影响很大。"
budget_ceiling_yuan:
  - "心里有没有预算上限?知道这个我能帮您更精准地定档。"
