# L3 问询模板 — 门面房(★ 核心业务)。
business_type:
  - "您的店是什么业态?(餐饮/咖啡/服装/眼镜/美业 等)"
  - "做什么类型的店?是不是品牌加盟,有总部 VI 手册吗?"
  - "店是自创品牌还是加盟?加盟的话总部一般会给装修手册,有的话发我看看。"
area_sqm:
  - "店铺面积大概多少平?有平面图最好。"
  - "租下来这套店铺多大?方便的话发张平面图,我可以更精准估。"
  - "店面套内面积多少?层高是多少米?(层高 > 4m 吊顶造价会上去)"
tier:
  - "您打算做基础、中端还是高端档次?品牌加盟一般是中端起。"
  - "心里有档次定位吗?——基础/中端/高端三档。"
ceiling_height_m:
  - "店面层高多少米?层高影响吊顶造价。"
needs_kitchen_engineering:
  - "店里需不需要做厨房工程?涉及排油烟、给排水改造的话单独算一块。"
  - "餐饮类的话,排烟、上下水接口位置在哪里?"
fire_constraints:
  - "商场或物业有没有给您一份装潢手册?里面会写消防、夜间施工、门头招牌的硬性限制。"
  - "商场对喷淋移位、甲级防火门有要求吗?"
rent_free_days:
  - "租约里有没有给免租装修期?多少天?这关系到工期紧迫度。"
  - "房东给了多少天免租期做装修?"
opening_deadline:
  - "计划什么时候开业?这是我排工期的参考。"
budget_ceiling_yuan:
  - "心里有预算上限吗?一般门面老板都心里有数,告诉我帮您按档定位。"
door_facade_required:
  - "门头招牌是您单独找广告公司做,还是希望我们一起报?"
