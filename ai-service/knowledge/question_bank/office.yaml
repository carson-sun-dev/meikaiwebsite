# L3 问询模板 — 办公。
area_sqm:
  - "办公室套内面积多大?如果有 CAD 平面图最好。"
  - "租的这层多少平?方便的话发份平面图我估得更准。"
headcount:
  - "团队规模多少人?有没有预留扩招?这决定开放区面积和工位数。"
  - "现在团队几个人?未来一两年会扩到多少?"
includes_weak_current:
  - "弱电是您让我们做还是另外找弱电公司?(网线/电话/监控/门禁/会议系统)"
needs_reception_logo:
  - "需不需要做前台 LOGO 墙?如果有 VI 文件发我看下。"
meeting_rooms:
  - "需要几个会议室?大会议室和小电话间分别要几个?"
night_work_required:
  - "大楼物业对施工时间有规定吗?有多少噪音工序需要排夜间?(夜间人工加班系数会上去)"
fire_system_modify:
  - "新布局会不会动到喷淋或烟感?涉及消防移位需要找资质单位报审,我会单独列项。"
style_pref:
  - "公司行业偏哪种风格——互联网科技风(裸顶 + 玻璃,偏省)还是金融律所风(全吊顶 + 隔音 + 木饰面,偏贵)?"
budget_ceiling_yuan:
  - "心里有预算上限吗?告诉我帮您按档定位。"
